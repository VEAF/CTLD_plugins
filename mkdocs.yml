site_name: CTLD Plugins
site_description: Optional pluggable scenes for CTLD (DCS World).
site_url: https://veaf.github.io/CTLD_plugins/
repo_url: https://github.com/VEAF/CTLD_plugins
repo_name: VEAF/CTLD_plugins
docs_dir: docs
edit_uri: blob/develop/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list

plugins:
  - search:
      lang: [en, fr]
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true

nav:
  - Home: index.md
  - Plugins:
    - Metal FARP: plugins/metal-farp.md
  - For authors:
    - Template: plugins/template.md
